name: Benchmark

on:
  schedule:
    - cron: "0 0 * * 1" # 毎週月曜 00:00 UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install memory-server dependencies
        working-directory: memory-server
        run: bun install --frozen-lockfile

      - name: Run benchmark CI
        working-directory: memory-server
        run: bun run src/benchmark/run-ci.ts

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: memory-server/src/benchmark/results/
          retention-days: 90
