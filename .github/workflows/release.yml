name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install release runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Verify tag commit is on main
        shell: bash
        env:
          MAIN_ANCESTOR_WAIT_SEC: "900"
          MAIN_ANCESTOR_INTERVAL_SEC: "15"
        run: |
          set -euo pipefail
          wait_sec="${MAIN_ANCESTOR_WAIT_SEC:-900}"
          interval_sec="${MAIN_ANCESTOR_INTERVAL_SEC:-15}"
          if ! [[ "${wait_sec}" =~ ^[0-9]+$ ]] || [ "${wait_sec}" -lt 0 ]; then
            wait_sec=900
          fi
          if ! [[ "${interval_sec}" =~ ^[0-9]+$ ]] || [ "${interval_sec}" -lt 1 ]; then
            interval_sec=15
          fi

          deadline=$(( $(date +%s) + wait_sec ))
          while true; do
            git fetch origin main
            if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "Tag commit is contained in origin/main: ${GITHUB_SHA}"
              break
            fi

            now=$(date +%s)
            if [ "${now}" -ge "${deadline}" ]; then
              echo "::error::Release tag commit is still not contained in origin/main: ${GITHUB_SHA}"
              echo "::error::Merge the release branch into main and rerun this workflow."
              exit 1
            fi

            remaining=$(( deadline - now ))
            echo "Tag commit not in origin/main yet. Retrying in ${interval_sec}s (remaining ${remaining}s)..."
            sleep "${interval_sec}"
          done

      - name: Verify tag/version match
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=${TAG_VERSION}"
          echo "package=${PKG_VERSION}"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag version and package.json version must match."
            exit 1
          fi

      - name: Install UI dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd harness-mem-ui
          bun install --frozen-lockfile

      - name: Install memory-server dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd memory-server
          bun install --frozen-lockfile

      - name: Install MCP server dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd mcp-server
          npm ci
          npm run build --silent

      - name: Restore multilingual-e5 cache
        uses: actions/cache@v4
        with:
          path: ~/.harness-mem/models/multilingual-e5
          key: release-embedding-${{ runner.os }}-multilingual-e5-v1

      - name: Ensure release embedding model
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/harness-mem model pull multilingual-e5 --yes

      - name: Run UI quality gates
        shell: bash
        run: |
          set -euo pipefail
          cd harness-mem-ui
          bun run test:ui
          bun run typecheck

      - name: Run repository behavior gate
        shell: bash
        run: |
          set -euo pipefail
          npm test

      - name: Run memory server typecheck
        shell: bash
        run: |
          set -euo pipefail
          cd memory-server
          bun run typecheck

      - name: Developer-domain gate
        shell: bash
        env:
          MANIFEST_PATH: memory-server/src/benchmark/results/ci-run-manifest-latest.json
          THRESHOLDS_PATH: docs/benchmarks/developer-domain-thresholds.json
        run: |
          set -euo pipefail
          # Run the full benchmark to produce a fresh manifest, then evaluate the
          # 4 developer-domain metrics against Layer 1 absolute floor thresholds.
          # mode=warn (default) means failures emit ::warning:: but do not block
          # the release. Flip mode to "enforce" in developer-domain-thresholds.json
          # once §78-A03 (bilingual) and §78-A05 (dev-workflow) both land.
          npm run benchmark
          bash scripts/check-developer-domain-gate.sh

      - name: Inject actionability gate (§S109-004)
        shell: bash
        env:
          MANIFEST_PATH: memory-server/src/benchmark/results/ci-run-manifest-latest.json
        run: |
          set -euo pipefail
          # decisions.md D8: delivered_rate < 95% block / consumed_rate < 30% block
          # / 30–60% warn / >= 60% green. Tier is computed by run-ci.ts and emitted
          # into the manifest under inject_actionability.tier; this script only
          # reads the tier and exits 0/1 accordingly.
          bash scripts/check-inject-actionability.sh

      - name: Dry-run package check
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  go-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go tests
        run: cd mcp-server-go && go test ./...

      - name: Cross-compile Go binary
        run: |
          cd mcp-server-go && GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags="-s -w" -o ../harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, go-build]
    permissions:
      contents: write
    steps:
      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          pattern: harness-mcp-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            harness-mcp-darwin-arm64
            harness-mcp-darwin-amd64
            harness-mcp-linux-amd64
            harness-mcp-windows-amd64.exe
