openapi: "3.1.0"

info:
  title: harness-mem API
  version: "1.0.0"
  description: >
    harness-mem memory server API. Provides event recording, semantic search,
    session management, analytics, sync, and admin operations.

servers:
  - url: http://localhost:3000
    description: Local development server

security:
  - bearerAuth: []
  - harnessMemToken: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    harnessMemToken:
      type: apiKey
      in: header
      name: x-harness-mem-token

  schemas:
    Platform:
      type: string
      enum: [claude, codex, opencode, cursor, antigravity, gemini]

    EventType:
      type: string
      enum: [session_start, user_prompt, tool_use, checkpoint, session_end]

    MemoryType:
      type: string
      enum: [episodic, semantic, procedural]

    QuestionKind:
      type: string
      enum: [profile, timeline, graph, vector, hybrid]

    Sector:
      type: string
      enum: [work, people, health, hobby, meta]

    RelationType:
      type: string
      enum: [follows, extends, updates, shared_entity, derives, contradicts, causes, part_of]

    ConflictPolicy:
      type: string
      enum: [last-write-wins, local-wins, remote-wins]

    ConnectorType:
      type: string
      enum: [github, notion, gdrive]

    EventEnvelope:
      type: object
      required: [platform, project, session_id, event_type]
      properties:
        event_id:
          type: string
        platform:
          oneOf:
            - $ref: "#/components/schemas/Platform"
            - type: string
        project:
          type: string
        session_id:
          type: string
        event_type:
          oneOf:
            - $ref: "#/components/schemas/EventType"
            - type: string
        ts:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
        privacy_tags:
          type: array
          items:
            type: string
        dedupe_hash:
          type: string
        correlation_id:
          type: string
        user_id:
          type: string
        team_id:
          type: string

    Observation:
      type: object
      properties:
        id:
          type: string
        platform:
          type: string
        project:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        content:
          type: string
        ts:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        privacy_tags:
          type: array
          items:
            type: string
        memory_type:
          $ref: "#/components/schemas/MemoryType"
        importance:
          type: number
          format: float
        user_id:
          type: string
        team_id:
          type: string
        correlation_id:
          type: string

    Session:
      type: object
      properties:
        session_id:
          type: string
        project:
          type: string
        platform:
          type: string
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
        event_count:
          type: integer
        summary:
          type: string

    SearchResult:
      type: object
      properties:
        id:
          type: string
        score:
          type: number
          format: float
        content:
          type: string
        platform:
          type: string
        project:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        ts:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        debug:
          type: object
          additionalProperties: true

    FacetResult:
      type: object
      properties:
        types:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              count:
                type: integer
        projects:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              count:
                type: integer
        tags:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              count:
                type: integer

    FeedItem:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        platform:
          type: string
        project:
          type: string
        session_id:
          type: string
        event_type:
          type: string
        ts:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    TimelineItem:
      type: object
      properties:
        id:
          type: string
        ts:
          type: string
          format: date-time
        event_type:
          type: string
        content:
          type: string
        platform:
          type: string
        session_id:
          type: string

    CheckpointResult:
      type: object
      properties:
        observation_id:
          type: string
        session_id:
          type: string
        title:
          type: string

    ResumePack:
      type: object
      properties:
        project:
          type: string
        session_id:
          type: string
        context:
          type: string
        checkpoints:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        token_estimate:
          type: integer

    GraphNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        entity_type:
          type: string
        observation_count:
          type: integer

    GraphEdge:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        relation:
          $ref: "#/components/schemas/RelationType"
        weight:
          type: number
          format: float

    GraphResult:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    Link:
      type: object
      properties:
        id:
          type: string
        from_observation_id:
          type: string
        to_observation_id:
          type: string
        relation:
          $ref: "#/components/schemas/RelationType"
        weight:
          type: number
          format: float
        created_at:
          type: string
          format: date-time

    ProjectStats:
      type: object
      properties:
        project:
          type: string
        observation_count:
          type: integer
        session_count:
          type: integer
        last_active:
          type: string
          format: date-time

    HealthItem:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        vector_engine:
          type: string
        fts_enabled:
          type: boolean
        counts:
          type: object
          properties:
            observations:
              type: integer
            sessions:
              type: integer

    MetricsResult:
      type: object
      additionalProperties: true

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        details:
          type: object
          additionalProperties: true
        ts:
          type: string
          format: date-time

    ImportJob:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        imported_count:
          type: integer
        error:
          type: string

    BackupResult:
      type: object
      properties:
        path:
          type: string
        size_bytes:
          type: integer

    UsageStats:
      type: object
      properties:
        period:
          type: string
        rows:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer

    EntityDistribution:
      type: object
      properties:
        entity:
          type: string
        entity_type:
          type: string
        count:
          type: integer

    TimelineStats:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        buckets:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              count:
                type: integer

    OverviewStats:
      type: object
      properties:
        total_observations:
          type: integer
        total_sessions:
          type: integer
        total_projects:
          type: integer
        recent_activity:
          type: array
          items:
            type: object
            additionalProperties: true

    SyncRecord:
      type: object
      required: [id, content, updated_at, device_id]
      properties:
        id:
          type: string
        content:
          type: string
        updated_at:
          type: string
          format: date-time
        device_id:
          type: string

    Changeset:
      type: object
      properties:
        device_id:
          type: string
        since:
          type: string
          format: date-time
        records:
          type: array
          items:
            $ref: "#/components/schemas/SyncRecord"

    ConnectorInfo:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/ConnectorType"

    ApiMeta:
      type: object
      required: [count, latency_ms, sla_latency_ms, filters, ranking]
      properties:
        count:
          type: integer
        latency_ms:
          type: number
          format: float
        sla_latency_ms:
          type: number
          format: float
        filters:
          type: object
          additionalProperties: true
        ranking:
          type: string

    ApiResponse:
      type: object
      required: [ok, source, items, meta]
      properties:
        ok:
          type: boolean
        source:
          type: string
          enum: [core, merged, sync]
        items:
          type: array
          items: {}
        meta:
          $ref: "#/components/schemas/ApiMeta"
        error:
          type: string

    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string

    Team:
      type: object
      properties:
        team_id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        team_id:
          type: string
        user_id:
          type: string
        role:
          type: string
          enum: [admin, member, viewer]
        joined_at:
          type: string
          format: date-time

paths:
  /health:
    get:
      summary: Health check
      description: Returns server health status.
      operationId: getHealth
      security: []
      tags: [System]
      responses:
        "200":
          description: Server health information
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/HealthItem"

  /v1/events/record:
    post:
      summary: Record an event
      description: Records an event envelope into the memory store.
      operationId: recordEvent
      tags: [Events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event]
              properties:
                event:
                  $ref: "#/components/schemas/EventEnvelope"
      responses:
        "200":
          description: Event recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Write queue full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/search:
    post:
      summary: Search observations
      description: Hybrid search combining lexical, vector, graph, recency, tag and importance signals.
      operationId: search
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                project:
                  type: string
                session_id:
                  type: string
                since:
                  type: string
                  format: date-time
                until:
                  type: string
                  format: date-time
                as_of:
                  type: string
                  format: date-time
                limit:
                  type: integer
                  default: 20
                include_private:
                  type: boolean
                  default: false
                expand_links:
                  type: boolean
                  default: true
                strict_project:
                  type: boolean
                  default: true
                debug:
                  type: boolean
                  default: false
                question_kind:
                  $ref: "#/components/schemas/QuestionKind"
                sector:
                  $ref: "#/components/schemas/Sector"
                memory_type:
                  oneOf:
                    - $ref: "#/components/schemas/MemoryType"
                    - type: array
                      items:
                        $ref: "#/components/schemas/MemoryType"
                sort_by:
                  type: string
                  enum: [relevance, date_desc, date_asc]
                  default: relevance
                  description: "Sort order: relevance (default), date_desc (newest first), date_asc (oldest first)"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/SearchResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/search/facets:
    get:
      summary: Search facets
      description: Returns aggregated facets (types, projects, tags) for filtering.
      operationId: searchFacets
      tags: [Search]
      parameters:
        - name: query
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Facet results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/FacetResult"

  /v1/feed:
    get:
      summary: Get feed
      description: Returns a paginated feed of recent observations.
      operationId: getFeed
      tags: [Feed]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 40
        - name: project
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
        - name: user_id
          in: query
          description: Only available when authentication is configured.
          schema:
            type: string
        - name: team_id
          in: query
          description: Only available when authentication is configured.
          schema:
            type: string
        - name: memory_type
          in: query
          schema:
            $ref: "#/components/schemas/MemoryType"
      responses:
        "200":
          description: Feed items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/FeedItem"

  /v1/timeline:
    post:
      summary: Get timeline
      description: Returns temporal timeline for a specific observation or entity.
      operationId: getTimeline
      tags: [Observations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                before:
                  type: number
                after:
                  type: number
                include_private:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Timeline items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/TimelineItem"
        "400":
          description: id is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/observations/get:
    post:
      summary: Get observations by IDs
      description: Returns full observation objects for the given IDs.
      operationId: getObservations
      tags: [Observations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                include_private:
                  type: boolean
                  default: false
                compact:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Observation objects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Observation"

  /v1/observations/bulk-delete:
    post:
      summary: Bulk delete observations
      description: Deletes multiple observations by ID.
      operationId: bulkDeleteObservations
      tags: [Observations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  minItems: 1
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: ids required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/finalize:
    post:
      summary: Finalize session
      description: Finalizes a session and generates a summary.
      operationId: finalizeSession
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
                platform:
                  oneOf:
                    - $ref: "#/components/schemas/Platform"
                    - type: string
                project:
                  type: string
                summary_mode:
                  type: string
                  enum: [standard, short, detailed]
      responses:
        "200":
          description: Session finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: session_id required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/list:
    get:
      summary: List sessions
      description: Returns a list of sessions optionally filtered by project.
      operationId: sessionsList
      tags: [Sessions]
      parameters:
        - name: project
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Session"

  /v1/sessions/thread:
    get:
      summary: Get session thread
      description: Returns all observations belonging to a session.
      operationId: sessionThread
      tags: [Sessions]
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 200
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Session thread
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Observation"
        "400":
          description: session_id required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/sessions/chain:
    get:
      summary: Resolve session chain
      description: Returns session chain by correlation ID.
      operationId: resolveSessionChain
      tags: [Sessions]
      parameters:
        - name: correlation_id
          in: query
          required: true
          schema:
            type: string
        - name: project
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: correlation_id and project are required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/checkpoints/record:
    post:
      summary: Record checkpoint
      description: Records a checkpoint observation for a session.
      operationId: recordCheckpoint
      tags: [Checkpoints]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, title, content]
              properties:
                session_id:
                  type: string
                title:
                  type: string
                content:
                  type: string
                platform:
                  oneOf:
                    - $ref: "#/components/schemas/Platform"
                    - type: string
                project:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                privacy_tags:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Checkpoint recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/CheckpointResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/resume-pack:
    post:
      summary: Get resume pack
      description: Returns a condensed context pack for resuming a project session.
      operationId: resumePack
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project]
              properties:
                project:
                  type: string
                session_id:
                  type: string
                correlation_id:
                  type: string
                limit:
                  type: integer
                include_private:
                  type: boolean
                  default: false
                resume_pack_max_tokens:
                  type: integer
      responses:
        "200":
          description: Resume pack
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ResumePack"
        "400":
          description: project required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/projects/stats:
    get:
      summary: Project statistics
      description: Returns per-project observation and session counts.
      operationId: projectsStats
      tags: [Projects]
      parameters:
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProjectStats"

  /v1/stream:
    get:
      summary: SSE event stream
      description: Server-Sent Events stream for real-time observation updates.
      operationId: getStream
      tags: [Events]
      parameters:
        - name: include_private
          in: query
          schema:
            type: boolean
            default: false
        - name: project
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
        - name: last-event-id
          in: header
          schema:
            type: string
      responses:
        "200":
          description: SSE stream
          headers:
            Content-Type:
              schema:
                type: string
                example: "text/event-stream; charset=utf-8"
