name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package-install-smoke:
    name: Package install smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    needs: [go-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos
            os: macos-latest
          - label: windows
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Download Go MCP binaries
        uses: actions/download-artifact@v7
        with:
          pattern: harness-mcp-*
          path: bin
          merge-multiple: true

      - name: Mark Go MCP binaries executable
        shell: bash
        run: chmod +x bin/harness-mcp-* || true

      - name: Install smoke prerequisites (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew list jq >/dev/null 2>&1 || brew install jq
          brew list ripgrep >/dev/null 2>&1 || brew install ripgrep

      - name: Install smoke prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install jq ripgrep -y --no-progress

      - name: Verify package install and daemon smoke
        shell: bash
        env:
          HARNESS_MEM_SKIP_AUTO_UPDATE: "1"
          HARNESS_MEM_NON_INTERACTIVE: "1"
          HARNESS_MEM_ENABLE_UI: "false"
        run: |
          set -euo pipefail
          bash --version
          bun --version
          smoke_root="$(mktemp -d)"
          cleanup() {
            npm exec -- harness-mem mcp-gateway stop >/dev/null 2>&1 || true
            npm exec -- harness-memd stop >/dev/null 2>&1 || true
            rm -rf "${smoke_root}" || true
          }
          trap cleanup EXIT

          pack_json="$(npm pack --json)"
          pack_file="$(printf '%s' "${pack_json}" | node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(data[0].filename);')"
          pack_path="$(node -e 'process.stdout.write(require("path").resolve(process.argv[1]))' "${pack_file}")"

          mkdir -p "${smoke_root}/app" "${smoke_root}/project"
          cd "${smoke_root}/app"
          npm init -y >/dev/null
          npm install "${pack_path}"
          npm exec -- harness-mem --help >/dev/null
          npm exec -- harness-mem smoke --project "${smoke_root}/project"

          http_home="${smoke_root}/http-home"
          http_project="${smoke_root}/http-project"
          mkdir -p "${http_home}" "${http_project}"
          export HOME="${http_home}"
          export HARNESS_MEM_HOME="${http_home}/.harness-mem"
          export HARNESS_MEM_PORT="$((30000 + RANDOM % 10000))"
          export HARNESS_MEM_MCP_ADDR="127.0.0.1:$((40000 + RANDOM % 10000))"
          npm exec -- harness-mem setup --project "${http_project}" --platform codex,claude --skip-smoke --skip-quality --skip-version-check
          npm exec -- harness-mem mcp-gateway status --json | node -e 'const fs=require("fs"); const s=JSON.parse(fs.readFileSync(0,"utf8")); if (s.status !== "running" || s.auth_mode !== "token" || !s.gateway.ok) { console.error(JSON.stringify(s)); process.exit(1); }'
          npm exec -- harness-mem doctor --project "${http_project}" --platform codex,claude --mcp-transport http --json --read-only --skip-version-check | node -e 'const fs=require("fs"); const d=JSON.parse(fs.readFileSync(0,"utf8")); const g=d.checks.find(c=>c.name==="mcp_gateway"); if (!g || g.status !== "ok:http") { console.error(JSON.stringify(d)); process.exit(1); }'
          token="$(cat "${HARNESS_MEM_HOME}/mcp-gateway.token")"
          if [ -z "${token}" ]; then
            echo "::error::MCP token file is empty"
            exit 1
          fi
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            echo "Windows runner: skipping POSIX token mode assertion; token presence and redaction are verified below."
          else
            token_mode="$( (stat -c '%a' "${HARNESS_MEM_HOME}/mcp-gateway.token" 2>/dev/null || stat -f '%Lp' "${HARNESS_MEM_HOME}/mcp-gateway.token" 2>/dev/null) | head -n1 )"
            if [ "${token_mode}" != "600" ]; then
              echo "::error::MCP token file mode is ${token_mode}; expected 600"
              exit 1
            fi
          fi
          config_paths=()
          for config_path in "${http_home}/.codex" "${http_home}/.claude.json" "${http_home}/.claude"; do
            [ -e "${config_path}" ] && config_paths+=("${config_path}")
          done
          if [ "${#config_paths[@]}" -eq 0 ]; then
            echo "::error::No Claude/Codex client config paths were created"
            exit 1
          fi
          if ! grep -R "HARNESS_MEM_MCP_TOKEN" "${config_paths[@]}" >/dev/null 2>&1; then
            echo "::error::HTTP MCP client config does not reference HARNESS_MEM_MCP_TOKEN"
            exit 1
          fi
          if grep -R "${token}" "${config_paths[@]}" 2>/dev/null; then
            echo "::error::MCP token leaked into HTTP client config"
            exit 1
          fi
          npm exec -- harness-mem mcp-config --transport stdio --client codex,claude --home "${http_home}" --write --json | tee "${smoke_root}/rollback.json" >/dev/null
          if grep -R "${token}" "${config_paths[@]}" "${smoke_root}/rollback.json" 2>/dev/null; then
            echo "::error::MCP token leaked into client config or config output"
            exit 1
          fi
          npm exec -- harness-mem setup --project "${http_project}" --platform codex,claude --skip-start --skip-smoke --skip-quality --skip-version-check
          if grep -qE '^[[:space:]]*url[[:space:]]*=' "${http_home}/.codex/config.toml"; then
            echo "::error::Implicit setup rewrote existing Codex stdio config to HTTP"
            exit 1
          fi
          node -e 'const fs=require("fs"); const c=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const h=c.mcpServers && c.mcpServers.harness; if (!h || h.url || h.type === "http" || !h.command) { console.error(JSON.stringify(h)); process.exit(1); }' "${http_home}/.claude.json"
          npm exec -- harness-mem mcp-gateway stop >/dev/null 2>&1 || true
          npm exec -- harness-memd stop >/dev/null 2>&1 || true

          rm -f "${pack_path}"

  publish-npm:
    runs-on: ubuntu-latest
    needs: [go-build, package-install-smoke]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install release runner prerequisites
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq ripgrep

      - name: Download Go MCP binaries
        uses: actions/download-artifact@v7
        with:
          pattern: harness-mcp-*
          path: bin
          merge-multiple: true

      - name: Mark Go MCP binaries executable
        shell: bash
        run: chmod +x bin/harness-mcp-* || true

      - name: Verify tag commit is on main
        shell: bash
        env:
          MAIN_ANCESTOR_WAIT_SEC: "900"
          MAIN_ANCESTOR_INTERVAL_SEC: "15"
        run: |
          set -euo pipefail
          wait_sec="${MAIN_ANCESTOR_WAIT_SEC:-900}"
          interval_sec="${MAIN_ANCESTOR_INTERVAL_SEC:-15}"
          if ! [[ "${wait_sec}" =~ ^[0-9]+$ ]] || [ "${wait_sec}" -lt 0 ]; then
            wait_sec=900
          fi
          if ! [[ "${interval_sec}" =~ ^[0-9]+$ ]] || [ "${interval_sec}" -lt 1 ]; then
            interval_sec=15
          fi

          deadline=$(( $(date +%s) + wait_sec ))
          while true; do
            git fetch origin main
            if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
              echo "Tag commit is contained in origin/main: ${GITHUB_SHA}"
              break
            fi

            now=$(date +%s)
            if [ "${now}" -ge "${deadline}" ]; then
              echo "::error::Release tag commit is still not contained in origin/main: ${GITHUB_SHA}"
              echo "::error::Merge the release branch into main and rerun this workflow."
              exit 1
            fi

            remaining=$(( deadline - now ))
            echo "Tag commit not in origin/main yet. Retrying in ${interval_sec}s (remaining ${remaining}s)..."
            sleep "${interval_sec}"
          done

      - name: Verify tag/version match
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=${TAG_VERSION}"
          echo "package=${PKG_VERSION}"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag version and package.json version must match."
            exit 1
          fi

      - name: Install UI dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd harness-mem-ui
          bun install --frozen-lockfile

      - name: Install memory-server dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd memory-server
          bun install --frozen-lockfile

      - name: Install MCP server dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd mcp-server
          npm ci
          npm run build --silent

      - name: Restore multilingual-e5 cache
        uses: actions/cache@v5
        with:
          path: ~/.harness-mem/models/multilingual-e5
          key: release-embedding-${{ runner.os }}-multilingual-e5-v1

      - name: Ensure release embedding model
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/harness-mem model pull multilingual-e5 --yes

      - name: Run UI quality gates
        shell: bash
        run: |
          set -euo pipefail
          cd harness-mem-ui
          bun run test:ui
          bun run typecheck

      - name: Run repository behavior gate
        shell: bash
        run: |
          set -euo pipefail
          npm test

      - name: Run memory server typecheck
        shell: bash
        run: |
          set -euo pipefail
          cd memory-server
          bun run typecheck

      - name: Developer-domain gate
        shell: bash
        env:
          MANIFEST_PATH: memory-server/src/benchmark/results/ci-run-manifest-latest.json
          THRESHOLDS_PATH: docs/benchmarks/developer-domain-thresholds.json
        run: |
          set -euo pipefail
          # Run the full benchmark to produce a fresh manifest, then evaluate the
          # 4 developer-domain metrics against Layer 1 absolute floor thresholds.
          # mode=enforce means developer-domain metric failures block release.
          # S108-005b reconciles S108 metrics into the manifest before the gate
          # reads it.
          npm run benchmark
          npm run benchmark:developer-domain
          bash scripts/check-developer-domain-gate.sh

      - name: Inject actionability gate (§S109-004)
        shell: bash
        env:
          MANIFEST_PATH: memory-server/src/benchmark/results/ci-run-manifest-latest.json
        run: |
          set -euo pipefail
          # decisions.md D8: delivered_rate < 95% block / consumed_rate < 30% block
          # / 30–60% warn / >= 60% green. Tier is computed by run-ci.ts and emitted
          # into the manifest under inject_actionability.tier; this script only
          # reads the tier and exits 0/1 accordingly.
          bash scripts/check-inject-actionability.sh

      - name: WorkGraph release gate (§S125-016)
        shell: bash
        env:
          MANIFEST_PATH: memory-server/src/benchmark/results/ci-run-manifest-latest.json
          HARNESS_MEM_WORKGRAPH_GATE: enforce
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-gates
          # S125-016 adds an enforce readiness pack before the manifest gate:
          # 3 enforce smoke runs plus a dry-run import of the real Plans.md.
          npm run benchmark:workgraph:readiness -- --runs 3 --artifact-dir artifacts/release-gates/s125-workgraph-enforce-readiness
          bash scripts/check-workgraph-release-gate.sh

      - name: Upload WorkGraph gate artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: s125-workgraph-enforce-readiness
          path: artifacts/release-gates/s125-workgraph-enforce-readiness
          if-no-files-found: warn

      - name: Recall Runtime release gate (§S128-013)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-gates
          npm run benchmark:recall-runtime -- --enforce --out artifacts/release-gates/s128-recall-runtime-gate.json

      - name: Upload Recall Runtime gate artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: s128-recall-runtime-gate
          path: artifacts/release-gates/s128-recall-runtime-gate.json
          if-no-files-found: warn

      - name: Dry-run package check
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  go-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: mcp-server-go/go.mod
          cache-dependency-path: mcp-server-go/go.sum

      - name: Run Go tests
        run: cd mcp-server-go && go test ./...

      - name: Cross-compile Go binary
        run: |
          cd mcp-server-go && GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o ../harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./main.go

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: harness-mcp-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  go-native-smoke:
    name: Go MCP native smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos
            os: macos-latest
          - label: windows
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: mcp-server-go/go.mod
          cache-dependency-path: mcp-server-go/go.sum

      - name: Run Go tests natively
        shell: bash
        run: |
          set -euo pipefail
          cd mcp-server-go
          go test ./...

      - name: Build native Go MCP binary
        shell: bash
        run: |
          set -euo pipefail
          cd mcp-server-go
          ext=""
          if [ "${RUNNER_OS}" = "Windows" ]; then
            ext=".exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "../harness-mcp-native-${{ matrix.label }}${ext}" ./main.go
          test -s "../harness-mcp-native-${{ matrix.label }}${ext}"

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, go-build, go-native-smoke]
    permissions:
      contents: write
    steps:
      - name: Download Go binaries
        uses: actions/download-artifact@v7
        with:
          pattern: harness-mcp-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            harness-mcp-darwin-arm64
            harness-mcp-darwin-amd64
            harness-mcp-linux-amd64
            harness-mcp-windows-amd64.exe
