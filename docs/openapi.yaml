      operationId: ingestAudio
      tags: [Ingest]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file (wav, mp3, etc.)
                project:
                  type: string
                session_id:
                  type: string
                language:
                  type: string
                  description: BCP-47 language code (e.g. "en", "ja")
                tags:
                  type: string
                  description: Comma-separated list of tags
      responses:
        "200":
          description: Audio ingested
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            observation_id:
                              type: string
                            transcript:
                              type: string
                            duration_seconds:
                              type: number
