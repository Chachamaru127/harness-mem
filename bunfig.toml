[test]
# harness-mem-ui/tests/ は vitest (ui/) と Playwright (e2e/) を使用
# bun test では実行不可のため、以下のスクリプトで実行:
#   bun run test:ui   → cd harness-mem-ui && bunx vitest
#   bun run test:e2e  → cd harness-mem-ui && bunx playwright test
#
# bun test の [test].exclude はバグで無視される (oven-sh/bun#17028)
# 代わりに package.json scripts.test でディレクトリを明示指定
