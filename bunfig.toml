[test]
# harness-mem-ui/tests/ は Vitest / Playwright 専用 naming に分離する。
# Bun の [test].exclude は安定しないため、file pattern で boundary を作る。
# official stable path は引き続き:
#   npm test
#   bun run test:ui
#   bun run test:e2e
#
# harness-mem-ui/tests/ui   → *.vitest.ts(x)
# harness-mem-ui/tests/e2e  → *.e2e.ts
