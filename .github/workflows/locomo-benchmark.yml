name: LOCOMO Benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

env:
  # F1 回帰ゲートの閾値（Runbook と CI が同じ値を参照する一元管理）
  # locomo-gate-check.ts の LOCOMO_F1_THRESHOLD 環境変数として渡される
  LOCOMO_F1_THRESHOLD: "0.05"

jobs:
  locomo-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          cd memory-server
          bun install --frozen-lockfile

      - name: Run LOCOMO benchmark (harness-mem)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          bun run tests/benchmarks/run-locomo-benchmark.ts \
            --system harness-mem \
            --dataset tests/benchmarks/fixtures/locomo10.sample.json \
            --output artifacts/locomo-harness-mem.json \
            | tee artifacts/locomo-harness-mem.log

      - name: Run F1 regression gate (LOCO-002/003)
        shell: bash
        env:
          LOCOMO_F1_THRESHOLD: ${{ env.LOCOMO_F1_THRESHOLD }}
        run: |
          set -euo pipefail
          BASELINE=memory-server/src/benchmark/results/locomo-baseline.json
          CURRENT=artifacts/locomo-harness-mem.json
          # 閾値は LOCOMO_F1_THRESHOLD 環境変数から読み込む（Runbook と同期）
          bun run memory-server/src/benchmark/locomo-gate-check.ts \
            --current "${CURRENT}" \
            --baseline "${BASELINE}"

      - name: Upload LOCOMO artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locomo-benchmark-artifacts
          path: artifacts/
