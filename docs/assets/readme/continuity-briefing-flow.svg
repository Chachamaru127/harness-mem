<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Continuity briefing flow</title>
  <desc id="desc">Local project memory is stored on the machine, summarized at session end, and surfaced on the first turn of the next session.</desc>
  <rect width="1200" height="360" rx="28" fill="#071923"/>
  <rect x="42" y="42" width="1116" height="276" rx="24" fill="#0B2533" stroke="#1F5167" stroke-width="2"/>

  <rect x="84" y="104" width="246" height="140" rx="18" fill="#12384B" stroke="#4C88A6" stroke-width="2"/>
  <text x="207" y="140" fill="#EAF7FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">You finish a session</text>
  <text x="207" y="176" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Decisions, fixes, next steps</text>
  <text x="207" y="204" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">stay in the project DB</text>

  <path d="M356 174H444" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M444 174L424 162" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M444 174L424 186" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="470" y="104" width="260" height="140" rx="18" fill="#12384B" stroke="#4C88A6" stroke-width="2"/>
  <text x="600" y="140" fill="#EAF7FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Harness-mem stores it</text>
  <text x="600" y="176" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Local-first, project-scoped, private</text>
  <text x="600" y="204" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">no cloud memory service</text>

  <path d="M752 174H840" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round"/>
  <path d="M840 174L820 162" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M840 174L820 186" stroke="#7ED3FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="866" y="92" width="246" height="164" rx="18" fill="#12384B" stroke="#4C88A6" stroke-width="2"/>
  <text x="989" y="128" fill="#EAF7FF" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Next session opens</text>
  <text x="989" y="164" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">First turn starts with</text>
  <text x="989" y="192" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">chain-first continuity</text>
  <text x="989" y="220" fill="#B9D4E3" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">+ a short nearby teaser</text>

  <rect x="86" y="258" width="1028" height="28" rx="14" fill="#0F3041"/>
  <text x="600" y="278" fill="#7ED3FF" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">Claude Code + Codex share the same local project runtime</text>
</svg>
