    get:
      summary: Get entity subgraph
      description: Returns graph nodes and edges centered on an entity.
      operationId: getSubgraph
      tags: [Graph]
      parameters:
        - name: entity
          in: query
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
            minimum: 1
            maximum: 5
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Graph subgraph
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      ok:
                        type: boolean
                  - $ref: "#/components/schemas/GraphResult"
        "400":
          description: entity required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

