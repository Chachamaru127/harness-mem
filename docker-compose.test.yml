# Harness Memory Server - pgvector CI テスト用 Docker Compose
# pgvector/pgvector:pg16 イメージを使用して pgvector 拡張入り PostgreSQL を起動する
#
# 使い方:
#   docker compose -f docker-compose.test.yml up -d
#   POSTGRES_URL=postgres://harness:test@localhost:5433/harness_test bun test tests/unit/pgvector-search.test.ts
#   docker compose -f docker-compose.test.yml down -v

version: "3.9"

services:
  pgvector-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: test
      POSTGRES_DB: harness_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness -d harness_test"]
      interval: 5s
      timeout: 5s
      retries: 10
