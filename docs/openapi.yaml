      summary: Sync push
      description: Receives a changeset from a remote device and merges it. Requires admin token.
      operationId: syncPush
      tags: [Sync]
      security:
        - harnessMemToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [device_id]
              properties:
                device_id:
                  type: string
                since:
                  type: string
                  format: date-time
                records:
                  type: array
                  items:
                    $ref: "#/components/schemas/SyncRecord"
                  maxItems: 10000
                conflict_policy:
                  $ref: "#/components/schemas/ConflictPolicy"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            merged:
                              type: array
                              items:
                                type: string
                            conflicts:
                              type: array
                              items:
                                type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

