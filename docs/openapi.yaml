  - name: Observations
    description: Observation retrieval and management
  - name: Sessions
    description: Session lifecycle management
  - name: Checkpoints
    description: Session checkpointing
  - name: Projects
    description: Project-level statistics
  - name: Graph
    description: Knowledge graph operations
  - name: Analytics
    description: Usage and entity analytics
  - name: Ingest
    description: Bulk data ingestion from external sources
  - name: Sync
    description: Device synchronization and connector management
  - name: Admin
    description: Administrative operations (require admin token)
  - name: Teams
    description: Team management (require admin token)
