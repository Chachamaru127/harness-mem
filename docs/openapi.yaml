      description: Creates a typed link between two observations.
      operationId: createLink
      tags: [Graph]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from_observation_id, to_observation_id, relation]
              properties:
                from_observation_id:
                  type: string
                to_observation_id:
                  type: string
                relation:
                  $ref: "#/components/schemas/RelationType"
                weight:
                  type: number
                  format: float
                  default: 1.0
      responses:
        "200":
          description: Link created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Link"
        "400":
          description: Required fields missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

